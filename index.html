<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日のメモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <style>
   body {
  font-family: 'Zen Maru Gothic', sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .app {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
    }

    h1 {
      text-align: center;
      margin-bottom: 28px;
    }

    ul {
      padding: 0;
      margin: 0;
    }

    li {
      width: 100%;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #eee;
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      list-style: none;
    }

    li span {
      flex: 1;
      margin: 0 8px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    input[type="checkbox"] {
      accent-color: #777 !important;
      flex: 0 0 auto;
    }

    .done {
      color: gray;
      text-decoration: line-through;
    }

    .delete-button {
      margin-left: auto;
      border: none;
      background: transparent;
      color: #999;
      font-size: 18px;
      cursor: pointer;
    }

    .add-bar {
      width: 100%;
      box-sizing: border-box;
      margin-top: 12px;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: #eee;
      font-size: 24px;
      cursor: pointer;
    }

    .bottom-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .bottom-buttons button,
    .restore-button {
      flex: 1;
      text-align: center;
      padding: 12px;
      border: 1px solid #aaa;
      border-radius: 12px;
      background: white;
      font-size: 16px;
      cursor: pointer;
      box-sizing: border-box;
    }

    .restore-button input {
      display: none;
    }

    .hint {
      font-size: 12px;
      color: gray;
      text-align: center;
      margin-top: 16px;
    }

    .modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);

  display: flex;
  align-items: flex-start;
  justify-content: center;

  padding: 80px 20px 20px;

  z-index: 1000;
}

    .hidden {
      display: none;
    }

    .modal-content {
      width: 100%;
      max-width: 360px;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .modal-content h2 {
      margin-top: 0;
      text-align: center;
    }

    #taskInput {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      font-size: 16px;
      margin: 12px 0;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>

<body>
  <div class="app">
    <h1>今日のメモ</h1>

    <ul id="memoList"></ul>

    <button class="add-bar" onclick="openAddModal()">＋</button>

    <div class="bottom-buttons">
      <button onclick="clearAllMemos()">全削除</button>
      <button onclick="downloadBackup()">保存</button>

      <label class="restore-button">
        復元
        <input type="file" accept=".json" onchange="restoreBackup(event)">
      </label>
    </div>

    <p class="hint">タスクをタップすると編集</p>
  </div>

  <div id="taskModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">タスクを追加</h2>

      <input id="taskInput" type="text">

      <div class="modal-buttons">
        <button onclick="closeTaskModal()">キャンセル</button>
        <button onclick="saveTaskModal()">保存</button>
      </div>
    </div>
  </div>

  <script>
    let memos = JSON.parse(localStorage.getItem("memos")) || [];
    let editingIndex = null;

    memos = memos.map(memo => {
      if (typeof memo === "string") {
        return {
          text: memo,
          done: false
        };
      }

      return memo;
    });

    function saveMemos() {
      localStorage.setItem("memos", JSON.stringify(memos));
    }

    function renderMemos() {
      const list = document.getElementById("memoList");
      list.innerHTML = "";

      memos.sort((a, b) => a.done - b.done);
      saveMemos();

      memos.forEach((memo, index) => {
        const li = document.createElement("li");

        li.innerHTML = `
          <input type="checkbox" ${memo.done ? "checked" : ""}>

          <span class="${memo.done ? "done" : ""}">
            ${memo.text}
          </span>

          <button class="delete-button">×</button>
        `;

        const checkbox = li.querySelector("input");
        const textSpan = li.querySelector("span");
        const deleteButton = li.querySelector(".delete-button");

        checkbox.onchange = function () {
          memos[index].done = checkbox.checked;
          saveMemos();
          renderMemos();
        };

        textSpan.onclick = function () {
          openEditModal(index);
        };

        deleteButton.onclick = function () {
          memos.splice(index, 1);
          saveMemos();
          renderMemos();
        };

        list.appendChild(li);
      });
    }

    function openAddModal() {
      editingIndex = null;
      document.getElementById("modalTitle").textContent = "タスクを追加";
      document.getElementById("taskInput").value = "";
      document.getElementById("taskModal").classList.remove("hidden");
      document.getElementById("taskInput").focus();
    }

    function openEditModal(index) {
      editingIndex = index;
      document.getElementById("modalTitle").textContent = "タスクを編集";
      document.getElementById("taskInput").value = memos[index].text;
      document.getElementById("taskModal").classList.remove("hidden");
      document.getElementById("taskInput").focus();
    }

    function closeTaskModal() {
      document.getElementById("taskModal").classList.add("hidden");
      editingIndex = null;
    }

    function saveTaskModal() {
      const input = document.getElementById("taskInput");
      const text = input.value.trim();

      if (text === "") return;

      if (editingIndex === null) {
        memos.push({
          text: text,
          done: false
        });
      } else {
        memos[editingIndex].text = text;
      }

      saveMemos();
      renderMemos();
      closeTaskModal();
    }

    function clearAllMemos() {
      const ok = confirm("このページ内のタスクをすべて削除しますか？");

      if (!ok) return;

      memos = [];
      saveMemos();
      renderMemos();
    }

    function downloadBackup() {
      const data = JSON.stringify(memos);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "shopping-memo-backup.json";
      a.click();

      URL.revokeObjectURL(url);
    }

    function restoreBackup(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function () {
        memos = JSON.parse(reader.result);
        saveMemos();
        renderMemos();
      };

      reader.readAsText(file);
    }

    document.getElementById("taskInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        saveTaskModal();
      }
    });

    renderMemos();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
</body>
</html>
