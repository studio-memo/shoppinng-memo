<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>私の買い物メモ</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .app {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      cursor: pointer;
    }

    li {
      background: #eee;
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 8px;
      list-style: none;
      cursor: pointer;
    }

    li:hover {
      background: #ddd;
    }

    .hint {
      font-size: 12px;
      color: gray;
      text-align: center;
    }.backup-area {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}

.restore-button {
  padding: 10px 16px;
  background: #eee;
  border: 1px solid #aaa;
  border-radius: 4px;
  cursor: pointer;
}

.restore-button input {
  display: none;
}

  </style>
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>

<body>
  <div class="app">
    <h1>自分用買い物メモ</h1>

    <div class="input-area">
      <input id="memoInput" type="text" placeholder="入力してね">
      <button onclick="addMemo()">追加</button>
    </div>

    <ul id="memoList"></ul>
<div class="backup-area">
  <button onclick="downloadBackup()">保存ファイル作成</button>
  <label class="restore-button">
    復元
    <input type="file" accept=".json" onchange="restoreBackup(event)">
  </label>
</div>
    <p class="hint">タップすると消える</p>
  </div>

<script>
  let memos = JSON.parse(localStorage.getItem("memos")) || [];

  function saveMemos() {
    localStorage.setItem("memos", JSON.stringify(memos));
  }

  function renderMemos() {
    const list = document.getElementById("memoList");
    list.innerHTML = "";

    memos.forEach((memo, index) => {
      const li = document.createElement("li");
      li.textContent = memo;

      li.onclick = function () {
        memos.splice(index, 1);
        saveMemos();
        renderMemos();
      };

      list.appendChild(li);
    });
  }

  function addMemo() {
    const input = document.getElementById("memoInput");
    const text = input.value;

    if (text === "") return;

    memos.push(text);

    saveMemos();
    renderMemos();

    input.value = "";
  }
function downloadBackup() {
  const data = JSON.stringify(memos);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "shopping-memo-backup.json";
  a.click();

  URL.revokeObjectURL(url);
}

function restoreBackup(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function () {
    memos = JSON.parse(reader.result);
    saveMemos();
    renderMemos();
  };

  reader.readAsText(file);
}
  renderMemos();
  if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>
