<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日のメモ</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .app {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      cursor: pointer;
    }

  li {
  background: #eee;
  margin-bottom: 8px;
  padding: 10px;
  border-radius: 8px;
  list-style: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  gap: 8px;
}
    li:hover {
      background: #ddd;
    }

    .hint {
      font-size: 12px;
      color: gray;
      text-align: center;
    }.backup-area {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}

.restore-button {
  padding: 10px 16px;
  background: #eee;
  border: 1px solid #aaa;
  border-radius: 4px;
  cursor: pointer;
}

.restore-button input {
  display: none;
}

.done {
  color: gray;
  text-decoration: line-through;
}
.delete-button {
  margin-left: 10px;
  border: none;
  background: transparent;
  color: #999;
  font-size: 18px;
  cursor: pointer;
}

.delete-button:hover {
  color: red;
}
li span {
  flex: 1;
}
  </style>
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>

<body>
  <div class="app">
    <h1>今日のメモ</h1>

    <div class="input-area">
      <input id="memoInput" type="text" placeholder="入力してね">
      <button onclick="addMemo()">追加</button>
    </div>

    <ul id="memoList"></ul>
<button class="clear-button" onclick="clearAllMemos()">
  全タスク削除
</button>
<div class="backup-area">
  <button onclick="downloadBackup()">保存ファイル作成</button>
  <label class="restore-button">
    復元
    <input type="file" accept=".json" onchange="restoreBackup(event)">
  </label>
</div>
    <p class="hint">タップすると消える</p>
  </div>

<script>
  let memos = JSON.parse(localStorage.getItem("memos")) || [];

  function saveMemos() {
    localStorage.setItem("memos", JSON.stringify(memos));
  }

  function renderMemos() {
  const list = document.getElementById("memoList");
  list.innerHTML = "";
memos.sort((a, b) => a.done - b.done);
saveMemos();
  memos.forEach((memo, index) => {
    const li = document.createElement("li");

  li.innerHTML = `
  <input type="checkbox" ${memo.done ? "checked" : ""}>

  <span class="${memo.done ? "done" : ""}">
    ${memo.text}
  </span>

  <button class="delete-button">×</button>
`;  

   const checkbox = li.querySelector("input");

checkbox.onchange = function () {
  memos[index].done = checkbox.checked;
  saveMemos();
  renderMemos();
};
const textSpan = li.querySelector("span");
const deleteButton = li.querySelector(".delete-button");

deleteButton.onclick = function () {
  memos.splice(index, 1);
  saveMemos();
  renderMemos();
};
textSpan.onclick = function () {
  const newText = prompt("タスクを編集", memos[index].text);

  if (newText === null) return;
  if (newText.trim() === "") return;

  memos[index].text = newText;
  saveMemos();
  renderMemos();
};
    list.appendChild(li);
  });
}

  function addMemo() {
    const input = document.getElementById("memoInput");
    const text = input.value;

    if (text === "") return;

    memos.push({
  text: text,
  done: false
});

    saveMemos();
    renderMemos();

    input.value = "";
  }
  function clearAllMemos() {
  const ok = confirm("このページ内のタスクをすべて削除しますか？");

  if (!ok) return;

  memos = [];
  saveMemos();
  renderMemos();
}
function downloadBackup() {
  const data = JSON.stringify(memos);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "shopping-memo-backup.json";
  a.click();

  URL.revokeObjectURL(url);
}

function restoreBackup(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function () {
    memos = JSON.parse(reader.result);
    saveMemos();
    renderMemos();
  };

  reader.readAsText(file);
}
  renderMemos();
  if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>
